<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>텔레그램 로그인 - PriceTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 font-sans max-w-md mx-auto min-h-screen flex flex-col transition-colors duration-300">

<header class="p-4 flex justify-between items-center">
    <button onclick="location.href='/'" class="text-2xl font-bold p-1 hover:opacity-70">&times;</button>
</header>

<main class="flex-1 px-8 pt-20 flex flex-col items-center">
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-black text-blue-600 dark:text-blue-400 mb-3 tracking-tighter">PriceTracker</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">회원가입 없는 초고속 알림 서비스</p>
    </div>

    <div class="bg-white dark:bg-[#1e293b] w-full rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 text-center space-y-5">
        <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-2">
            <span class="text-3xl">🔔</span>
        </div>

        <div>
            <h2 class="font-bold text-lg mb-1">텔레그램 1초 로그인</h2>
            <p class="text-[11px] text-gray-400">아래 버튼을 누르고 텔레그램 앱에서 <br/><strong class="text-blue-500">'시작(Start)'</strong>을 누르시면 즉시 연결됩니다.</p>
        </div>

        <a id="telegramLoginBtn" href="#" target="_blank" class="w-full flex items-center justify-center gap-2 bg-[#2AABEE] hover:bg-[#2298D6] text-white font-bold py-3.5 rounded-xl transition shadow-md shadow-blue-500/20">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.686c.223-.195-.054-.285-.346-.096l-6.405 4.028-2.76-.864c-.6-.188-.61-.6.125-.89l10.736-4.138c.498-.184.945.116.782.891z"/></svg>
            텔레그램으로 시작하기
        </a>

        <div id="loadingIndicator" class="hidden flex items-center justify-center gap-2 text-xs text-gray-500 font-medium pt-2 animate-pulse">
            <div class="w-3 h-3 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            인증을 기다리고 있습니다...
        </div>
    </div>
</main>

<script>
    // 1. 랜덤 고유번호(UUID) 생성 (예: a7f8b9)
    const uuid = Math.random().toString(36).substring(2, 8);

    // 2. 본인의 봇 아이디로 딥링크 생성 (봇 아이디를 아래에 적어주세요!)
    // 🚨 주의: bot_username 부분에 본인이 만든 봇 아이디 (예: pricetracker277266_bot)를 적어주세요!
    const botUsername = "pricetracker277266_bot";

    const deepLink = `https://t.me/${botUsername}?start=${uuid}`;

    // 버튼에 링크 연결
    const btn = document.getElementById('telegramLoginBtn');
    btn.href = deepLink;

    // 버튼 클릭 시 로딩 애니메이션 켜기
    btn.addEventListener('click', () => {
        document.getElementById('loadingIndicator').classList.remove('hidden');
    });

    // 3. 1.5초마다 백엔드에 "인증되었나요?" 물어보기 (Polling)
    const pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/auth/check?uuid=${uuid}`);
            if (res.ok) {
                const data = await res.json();

                // 텔레그램에서 시작을 눌러서 백엔드가 chatId를 찾은 경우!
                clearInterval(pollInterval);

                // 브라우저에 내 고유 아이디(chatId) 저장
                localStorage.setItem('chatId', data.chatId);

                alert('인증 완료! 이제 알림을 받을 수 있습니다.');
                window.location.href = '/'; // 홈으로 이동
            }
        } catch (e) {
            // 아직 인증 안 됨 (대기)
        }
    }, 1500);
</script>
</body>
</html>
