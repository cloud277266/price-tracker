<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>추적 목록 - PriceTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style> ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 font-sans max-w-md mx-auto min-h-screen relative shadow-xl transition-colors duration-300 flex flex-col hidden" id="pageBody">

<header class="bg-white dark:bg-[#1e293b] p-4 sticky top-0 z-20 shadow-sm border-b border-gray-200 dark:border-gray-800 flex justify-between items-center transition-colors">
    <h1 class="text-xl font-extrabold tracking-tight text-blue-600 dark:text-blue-400">❤️ 내 추적 목록</h1>
    <button onclick="toggleNotiPanel()" class="text-xl hover:opacity-80 transition">🔔</button>
</header>

<main class="flex-1 overflow-y-auto pb-24 p-4">

    <div id="unauthView" class="hidden flex flex-col items-center justify-center py-24 text-center">
        <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mb-6 shadow-inner">
            <span class="text-4xl">🔐</span>
        </div>
        <h2 class="text-xl font-black mb-2 text-gray-800 dark:text-white">나만의 추적 목록</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
            텔레그램을 연동하면 내가 관심 있는 상품을<br>이곳에 모아보고 실시간 알림을 받을 수 있어요.
        </p>
        <button onclick="location.href='/login.html'" class="w-full max-w-[250px] flex items-center justify-center gap-2 bg-[#2AABEE] hover:bg-[#2298D6] text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30">
            1초 만에 텔레그램 연동하기
        </button>
    </div>

    <div id="authView" class="hidden space-y-4"></div>

</main>

<nav class="bg-white dark:bg-[#1e293b] border-t border-gray-200 dark:border-gray-800 flex justify-around items-center h-16 shrink-0 fixed bottom-0 w-full max-w-md z-20 pb-safe transition-colors">
    <button onclick="location.href='/'" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition">
        <span class="text-xl mb-0.5">🏠</span><span class="text-[10px] font-bold">홈</span>
    </button>
    <button class="flex flex-col items-center justify-center w-full h-full text-rose-500">
        <span class="text-xl mb-0.5">❤️</span><span class="text-[10px] font-bold">추적목록</span>
    </button>
    <button onclick="location.href='/profile.html'" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition">
        <span class="text-xl mb-0.5">👤</span><span class="text-[10px] font-bold">내정보</span>
    </button>
</nav>

<div id="notiPanel" class="fixed inset-y-0 right-0 w-80 bg-white dark:bg-[#1e293b] shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-[#0f172a]">
        <h3 class="font-bold text-gray-800 dark:text-white">🔔 알림 보관함</h3>
        <button onclick="toggleNotiPanel()" class="text-xl text-gray-400 hover:text-gray-600">&times;</button>
    </div>
    <div id="notiList" class="p-4 flex-1 overflow-y-auto space-y-3">
    </div>
</div>
<div id="notiOverlay" onclick="toggleNotiPanel()" class="hidden fixed inset-0 bg-black/20 z-40 backdrop-blur-sm transition-opacity"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatId = localStorage.getItem('chatId');

        if (!chatId || chatId === 'undefined' || chatId === 'null' || chatId === '') {
            document.getElementById('unauthView').classList.remove('hidden');
            document.getElementById('unauthView').classList.add('flex');
        } else {
            document.getElementById('authView').classList.remove('hidden');
            loadMyProducts(chatId);
        }
        document.getElementById('pageBody').classList.remove('hidden');
    });

    async function loadMyProducts(chatId) {
        const listDiv = document.getElementById('authView');
        listDiv.innerHTML = '<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>';

        try {
            const response = await fetch(`/api/products/my?chatId=${chatId}`);
            const products = await response.json();
            listDiv.innerHTML = '';

            if (products.length === 0) {
                listDiv.innerHTML = `<div class="flex flex-col items-center justify-center py-32 text-center"><span class="text-5xl mb-4 opacity-50">🛒</span><p class="text-gray-600 dark:text-gray-300 font-bold mb-1">아직 담아둔 상품이 없습니다.</p><p class="text-[11px] text-gray-400 mb-5">홈에서 원하는 상품을 찾아 추적을 시작해보세요.</p><button onclick="location.href='/'" class="px-6 py-2.5 bg-gray-900 dark:bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md transition">상품 탐색하기</button></div>`;
                return;
            }

            products.forEach(p => {
                const diff = p.currentPrice - p.targetPrice;
                const diffHtml = diff <= 0 ? `<span class="text-rose-500 text-xs font-bold bg-rose-50 px-2 py-1 rounded-md border border-rose-100">🎉 목표가 도달!</span>` : `<span class="text-gray-500 text-[11px] font-medium bg-gray-100 px-2 py-1 rounded-md">목표까지 ${(diff).toLocaleString()}원</span>`;
                listDiv.insertAdjacentHTML('beforeend', `
                        <div class="bg-white dark:bg-[#1e293b] p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 relative">
                            <button onclick="deleteProduct(${p.id}, '${p.productName}', '${chatId}')" class="absolute top-3 right-3 p-1 text-gray-400 hover:text-red-500 transition">❌</button>
                            <h3 class="font-bold text-sm mb-4 pr-8 text-gray-800 dark:text-gray-100 line-clamp-1">${p.productName}</h3>
                            <div class="flex justify-between items-end mb-4 bg-gray-50 dark:bg-[#0f172a] p-3 rounded-xl">
                                <div><p class="text-[10px] text-gray-500 mb-0.5">현재 최저가</p><p class="font-black text-lg text-blue-600">${p.currentPrice.toLocaleString()}<span class="text-xs font-normal">원</span></p></div>
                                <div class="text-right"><p class="text-[10px] text-gray-500 mb-0.5">목표가</p><p class="font-bold text-sm">${p.targetPrice.toLocaleString()}<span class="text-xs font-normal">원</span></p></div>
                            </div>
                            <div class="flex justify-between items-center pt-1">${diffHtml}<button onclick="window.open('${p.productUrl}', '_blank')" class="text-[11px] font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg">구매 ↗</button></div>
                        </div>`);
            });
        } catch (e) { listDiv.innerHTML = '<div class="text-center text-red-500 py-10 font-bold">오류가 발생했습니다.</div>'; }
    }

    async function deleteProduct(id, name, chatId) {
        if (!confirm(`[${name}]\n정말 추적을 취소하시겠습니까?`)) return;
        try {
            const res = await fetch(`/api/products/${id}?chatId=${chatId}`, { method: 'DELETE' });
            if (res.ok) loadMyProducts(chatId);
        } catch (e) { alert('오류가 발생했습니다.'); }
    }


    async function toggleNotiPanel() {
        const panel = document.getElementById('notiPanel');
        const overlay = document.getElementById('notiOverlay');
        const isOpen = !panel.classList.contains('translate-x-full');

        if (isOpen) {
            panel.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        } else {
            panel.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
            loadNotifications();
        }
    }

    async function loadNotifications() {
        const chatId = localStorage.getItem('chatId');
        const listDiv = document.getElementById('notiList');
        if (!chatId) {
            listDiv.innerHTML = '<p class="text-sm text-gray-500 text-center mt-10">로그인이 필요합니다.</p>';
            return;
        }
        listDiv.innerHTML = '<div class="animate-pulse flex space-x-4"><div class="flex-1 space-y-4 py-1"><div class="h-4 bg-gray-200 rounded w-3/4"></div><div class="space-y-2"><div class="h-4 bg-gray-200 rounded"></div></div></div></div>';

        try {
            const res = await fetch(`/api/notifications?chatId=${chatId}`);
            const data = await res.json();
            if (data.length === 0) {
                listDiv.innerHTML = '<p class="text-sm text-gray-400 text-center mt-10">최근 도착한 알림이 없습니다.</p>';
                return;
            }
            listDiv.innerHTML = data.map(n => `
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/10 rounded-xl border border-blue-100 dark:border-gray-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-blue-600 dark:text-blue-400">핫딜 도달</span>
                            <span class="text-[9px] text-gray-400">${new Date(n.createdAt).toLocaleString().slice(0, -3)}</span>
                        </div>
                        <p class="text-xs font-bold text-gray-800 dark:text-gray-200 line-clamp-1 mb-1">${n.productName}</p>
                        <p class="text-[10px] text-gray-500 dark:text-gray-400 whitespace-pre-line">${n.message.split('\\n')[2] || '목표가에 도달했습니다!'}</p>
                    </div>
                `).join('');
        } catch (e) { listDiv.innerHTML = '<p class="text-sm text-red-500">오류가 발생했습니다.</p>'; }
    }
</script>
</body>
</html>
