<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>추적 목록 - PriceTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style> ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 font-sans max-w-md mx-auto min-h-screen relative shadow-xl transition-colors duration-300 flex flex-col">

<header class="bg-white dark:bg-[#1e293b] p-4 sticky top-0 z-20 shadow-sm border-b border-gray-200 dark:border-gray-800 flex justify-between items-center transition-colors">
    <h1 class="text-xl font-extrabold tracking-tight text-blue-600 dark:text-blue-400">❤️ 내 추적 목록</h1>
    <button class="text-xl hover:opacity-80 transition">🔔</button>
</header>

<main class="flex-1 overflow-y-auto pb-24 p-4" id="mainContainer">

    <div id="unauthView" class="hidden flex flex-col items-center justify-center py-24 text-center">
        <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mb-6 shadow-inner">
            <span class="text-4xl">🔐</span>
        </div>
        <h2 class="text-xl font-black mb-2 text-gray-800 dark:text-white">나만의 추적 목록</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
            텔레그램을 연동하면 내가 관심 있는 상품을<br>
            이곳에 모아보고 실시간 알림을 받을 수 있어요.
        </p>
        <button onclick="location.href='/login.html'" class="w-full max-w-[250px] flex items-center justify-center gap-2 bg-[#2AABEE] hover:bg-[#2298D6] text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30">
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.686c.223-.195-.054-.285-.346-.096l-6.405 4.028-2.76-.864c-.6-.188-.61-.6.125-.89l10.736-4.138c.498-.184.945.116.782.891z"/></svg>
            1초 만에 텔레그램 연동하기
        </button>
    </div>

    <div id="authView" class="hidden space-y-4">
    </div>

</main>

<nav class="bg-white dark:bg-[#1e293b] border-t border-gray-200 dark:border-gray-800 flex justify-around items-center h-16 shrink-0 fixed bottom-0 w-full max-w-md z-20 pb-safe transition-colors">
    <button onclick="location.href='/'" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition">
        <span class="text-xl mb-0.5">🏠</span><span class="text-[10px] font-bold">홈</span>
    </button>
    <button class="flex flex-col items-center justify-center w-full h-full text-rose-500">
        <span class="text-xl mb-0.5">❤️</span><span class="text-[10px] font-bold">추적목록</span>
    </button>
    <button onclick="location.href='/login.html'" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition">
        <span class="text-xl mb-0.5">👤</span><span class="text-[10px] font-bold">내정보</span>
    </button>
</nav>

<script>
    const chatId = localStorage.getItem('chatId');

    document.addEventListener('DOMContentLoaded', () => {
        // 💡 렌더링 분기 처리: 아이디가 없으면 연동 안내 화면, 있으면 리스트 불러오기
        if (!chatId) {
            document.getElementById('unauthView').classList.remove('hidden');
            document.getElementById('unauthView').classList.add('flex');
        } else {
            document.getElementById('authView').classList.remove('hidden');
            loadMyProducts();
        }
    });

    async function loadMyProducts() {
        const listDiv = document.getElementById('authView');
        listDiv.innerHTML = '<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>';

        try {
            const response = await fetch(`/api/products/my?chatId=${chatId}`);
            if (!response.ok) throw new Error('불러오기 실패');

            const products = await response.json();
            listDiv.innerHTML = '';

            if (products.length === 0) {
                listDiv.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-32 text-center">
                            <span class="text-5xl mb-4 opacity-50">🛒</span>
                            <p class="text-gray-600 dark:text-gray-300 font-bold mb-1">아직 담아둔 상품이 없습니다.</p>
                            <p class="text-[11px] text-gray-400 mb-5">홈에서 원하는 상품을 찾아 추적을 시작해보세요.</p>
                            <button onclick="location.href='/'" class="px-6 py-2.5 bg-gray-900 dark:bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md transition">상품 탐색하기</button>
                        </div>
                    `;
                return;
            }

            // 상품 목록 그리기
            products.forEach(p => {
                const diff = p.currentPrice - p.targetPrice;
                const diffHtml = diff <= 0
                    ? `<span class="text-rose-500 text-xs font-bold bg-rose-50 dark:bg-rose-900/30 px-2 py-1 rounded-md border border-rose-100 dark:border-rose-800">🎉 목표가 도달!</span>`
                    : `<span class="text-gray-500 text-[11px] font-medium bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-md">목표까지 ${(diff).toLocaleString()}원</span>`;

                const html = `
                        <div class="bg-white dark:bg-[#1e293b] p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 transition-colors relative">
                            <button onclick="deleteProduct(${p.id}, '${p.productName}')" class="absolute top-3 right-3 p-1 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>

                            <h3 class="font-bold text-sm mb-4 pr-8 text-gray-800 dark:text-gray-100 line-clamp-1">${p.productName}</h3>

                            <div class="flex justify-between items-end mb-4 bg-gray-50 dark:bg-[#0f172a] p-3 rounded-xl">
                                <div>
                                    <p class="text-[10px] text-gray-500 dark:text-gray-400 mb-0.5">현재 최저가</p>
                                    <p class="font-black text-lg text-blue-600 dark:text-blue-400">${p.currentPrice.toLocaleString()}<span class="text-xs font-normal ml-0.5 text-gray-600 dark:text-gray-400">원</span></p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-gray-500 dark:text-gray-400 mb-0.5">목표가</p>
                                    <p class="font-bold text-sm text-gray-700 dark:text-gray-300">${p.targetPrice.toLocaleString()}<span class="text-xs font-normal ml-0.5">원</span></p>
                                </div>
                            </div>

                            <div class="flex justify-between items-center pt-1">
                                ${diffHtml}
                                <button onclick="window.open('${p.productUrl}', '_blank')" class="text-[11px] font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/40 transition">
                                    쇼핑몰 구매 ↗
                                </button>
                            </div>
                        </div>
                    `;
                listDiv.insertAdjacentHTML('beforeend', html);
            });

        } catch (error) {
            listDiv.innerHTML = '<div class="text-center text-red-500 py-10 font-bold">서버와 통신 중 오류가 발생했습니다.</div>';
        }
    }

    async function deleteProduct(id, name) {
        if (!confirm(`[${name}]\n정말 추적을 취소하시겠습니까?`)) return;

        try {
            const response = await fetch(`/api/products/${id}?chatId=${chatId}`, { method: 'DELETE' });
            if (response.ok) {
                loadMyProducts();
            } else {
                alert('삭제에 실패했습니다.');
            }
        } catch (error) {
            alert('서버 오류가 발생했습니다.');
        }
    }
</script>
</body>
</html>
